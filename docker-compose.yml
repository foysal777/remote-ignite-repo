services:
  redis:
    image: redis:7-alpine
    container_name: ignite-redis
    restart: always

  backend:
    container_name: ignite-backend
    build: .
    command: >
      gunicorn project_root.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - /opt/ignite/staticfiles:/app/staticfiles
      - /opt/ignite/media:/app/media
    depends_on:
      - redis
    restart: always

  celery:
    container_name: ignite-celery
    build: .
    command: celery -A project_root worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

